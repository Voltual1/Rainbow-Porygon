name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install GBA Toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-arm-none-eabi gcc-arm-none-eabi libnewlib-arm-none-eabi \
            libpng-dev python3 ccache

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 核心修复步骤：生成 GBA 资产，并将它们合并回源码根目录
      - name: Build GBA Assets & Mirror to Root
        run: |
          make -j$(nproc) tools
          # 生成所有 .gbapal, .4bpp 以及 map_groups.h
          # 使用 || true 是因为即便链接阶段报错，资产通常也已经生成完毕了
          make -j$(nproc) all KEEP_TEMPS=1 || echo "GBA Link failed, but checking for assets..."
          
          echo "Mirroring assets to satisfy Android preprocessor..."
          # 将 build 目录下的资产深度合并回根目录
          # 这样 ./graphics/crash_screen/assertf.pal.gbapal 就能被找到了
          [ -d "build/assets" ] && cp -a build/assets/. .
          [ -d "build/emerald" ] && cp -a build/emerald/. .
          
          # 确保 platform.h 在 include 目录下
          if [ ! -f "include/platform.h" ]; then
             echo "Syncing platform.h to include directory..."
             find src/platform -name "platform.h" -exec cp -v {} include/ \;
          fi
          
          # 解决 NDK 找不到生成的头文件问题
          find build/emerald -name "*.h" -exec cp -v {} include/ \;
          
          echo "Final check for critical files:"
          ls -l include/platform.h || exit 1
          ls -l graphics/crash_screen/assertf.pal.gbapal || echo "Warning: Asset sync partially failed"

      - name: Decode Keystore
        if: github.event_name != 'pull_request'
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY }}
        run: |
          echo $ENCODED_STRING | base64 -d > android/release.keystore

      - name: Build Android APK
        run: |
          chmod +x android/SDL2/android-project/gradlew
          # 此时 preproc 已经在根目录能看到所有 .gbapal 文件了
          android/SDL2/android-project/gradlew -p android :app:assembleRelease
        env:
          KEYSTORE_PATH: ../../release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pokeemerald-android-release
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create Draft Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-auto-build-${{ github.sha }}
          name: "Android Build Success"
          draft: true
          files: |
            android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up Keystore
        if: always()
        run: rm -f android/release.keystore