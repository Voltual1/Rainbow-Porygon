name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        if: github.event_name != 'pull_request'
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY }}
        run: |
          # 将签名文件解码到 android 目录下，注意路径要与 build.gradle 对应
          echo $ENCODED_STRING | base64 -d > android/release.keystore

      - name: Build with Gradle
        run: |
          chmod +x android/SDL2/android-project/gradlew
          android/SDL2/android-project/gradlew -p android :app:assembleRelease
        env:
          KEYSTORE_PATH: ../../release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Get version info
        id: version
        shell: bash
        run: |
          echo "BUILD_VERSION=android-build-$(date +%Y%m%d_%H%M%S)-${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pokeemerald-android-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create Draft Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.BUILD_VERSION }}
          name: "Android Auto Build ${{ steps.version.outputs.BUILD_VERSION }}"
          body: |
            ### Android 构建信息
            - 提交: `${{ github.sha }}`
            - 构建时间: `${{ steps.version.outputs.TIMESTAMP }}`
            - 目标平台: `armeabi-v7a` (API 36)
          draft: true
          files: |
            android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up Keystore
        if: always()
        run: rm -f android/release.keystore