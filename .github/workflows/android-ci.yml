name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive # 必须递归初始化 SDL2 等子模块

      # 1. 安装 GBA 编译器与依赖工具
      - name: Install GBA Toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-arm-none-eabi gcc-arm-none-eabi libnewlib-arm-none-eabi \
            libpng-dev python3 ccache

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 2. 核心修复步骤：完整运行一次 GBA 编译，并将生成的 assets 复制回源码目录，以兼容 Android 的 preproc 寻址
      - name: Build GBA ROM & Sync Assets to Source Tree
        run: |
          make -j$(nproc) tools
          make -j$(nproc)
          # 将 build/assets/ 目录下的所有编译后资产（.gbapal, .4bpp 等）同步回源码树
          cp -r build/assets/* .

      - name: Decode Keystore
        if: github.event_name != 'pull_request'
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY }}
        run: |
          echo $ENCODED_STRING | base64 -d > android/release.keystore

      - name: Build Android APK
        run: |
          chmod +x android/SDL2/android-project/gradlew
          android/SDL2/android-project/gradlew -p android :app:assembleRelease
        env:
          KEYSTORE_PATH: ../../release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Get version info
        id: version
        shell: bash
        run: |
          echo "BUILD_VERSION=android-build-$(date +%Y%m%d_%H%M%S)-${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pokeemerald-android-release
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create Draft Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.BUILD_VERSION }}
          name: "Android Auto Build ${{ steps.version.outputs.BUILD_VERSION }}"
          body: |
            ### Android 构建成功
            - 提交: `${{ github.sha }}`
            - 构建时间: `${{ steps.version.outputs.TIMESTAMP }}`
            - 资产已被同步至源码目录，通过了 preproc 预处理器检验。
          draft: true
          files: |
            android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up Keystore
        if: always()
        run: rm -f android/release.keystore
