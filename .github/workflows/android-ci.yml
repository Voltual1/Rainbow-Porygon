name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # 1. 安装 GBA 编译链（用于生成 .gbapal 和 .c 源码）
      - name: Install GBA Toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-arm-none-eabi gcc-arm-none-eabi libnewlib-arm-none-eabi \
            libpng-dev python3 ccache

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 2. 预编译 GBA：生成所有 NDK 编译所需的中间资源和头文件
      - name: Build GBA ROM & Sync Generated Files
        run: |
          make -j$(nproc) tools
          # KEEP_TEMPS=1 确保生成的 .i 文件和中间源码不被删除
          make -j$(nproc) all KEEP_TEMPS=1
          
          echo "Merging generated assets and code back to source tree..."
          # 关键操作：将 build 下两个核心输出目录的内容镜像复制回根目录
          # 这会把 build/assets/graphics/xxx.gbapal 放到 ./graphics/xxx.gbapal
          # 这会把 build/emerald/src/map_groups.h 放到 ./src/map_groups.h
          cp -a build/assets/. .
          cp -a build/emerald/. .
          echo "Merge complete."

      - name: Decode Keystore
        if: github.event_name != 'pull_request'
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY }}
        run: |
          echo $ENCODED_STRING | base64 -d > android/release.keystore

      - name: Build Android APK
        run: |
          chmod +x android/SDL2/android-project/gradlew
          # 执行 Android 构建，此时 preproc 将能正确找到根目录下被同步回来的 .gbapal 文件
          android/SDL2/android-project/gradlew -p android :app:assembleRelease
        env:
          KEYSTORE_PATH: ../../release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Get version info
        id: version
        shell: bash
        run: |
          echo "BUILD_VERSION=android-build-$(date +%Y%m%d_%H%M%S)-${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pokeemerald-android-release
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create Draft Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.BUILD_VERSION }}
          name: "Android Auto Build ${{ steps.version.outputs.BUILD_VERSION }}"
          body: |
            ### Android 构建成功
            - 提交: `${{ github.sha }}`
            - 构建说明: 已同步 GBA 编译产物（assets & generated code）至根目录，解决了 NDK 路径冲突。
          draft: true
          files: |
            android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up Keystore
        if: always()
        run: rm -f android/release.keystore