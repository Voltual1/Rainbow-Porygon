name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install GBA Toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-arm-none-eabi gcc-arm-none-eabi libnewlib-arm-none-eabi \
            libpng-dev python3 ccache

#      - name: Set up JDK 17
#        uses: actions/setup-java@v4
#        with:
#          java-version: "17"
#          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache GBA Assets, Tools and Build Objects
        id: cache-gba-assets
        uses: actions/cache@v4
        with:
          path: |
            .ccache
            tools/
            build/
            libagbsyscall/
            .map_version
            data/layouts/layouts.inc
            data/layouts/layouts_table.inc
            data/maps/connections.inc
            data/maps/events.inc
            data/maps/groups.inc
            data/maps/headers.inc
            data/maps/**/*.inc
            data/tilesets/**/*.4bpp
            graphics/**/*.4bpp
            graphics/**/*.gbapal
            graphics/**/*.smolTM
            graphics/**/*.smol
            include/constants/heal_locations.h
            include/constants/layouts.h
            include/constants/map_event_ids.h
            include/constants/map_groups.h
            include/constants/region_map_sections.h
            include/constants/script_commands.h
            sound/direct_sound_samples/**/*.bin
            sound/direct_sound_samples/*.bin
            sound/songs/midi/*.s
            src/data/battle_partners.h
            src/data/debug_trainers.h
            src/data/heal_locations.h
            src/data/map_group_count.h
            src/data/pokemon/teachable_learnsets.h
            src/data/region_map/region_map_entries.h
            src/data/trainers.h
            src/data/trainers_frlg.h
            src/data/tutor_moves.h
            src/data/wild_encounters.h
            test/battle/partner_control.h
            test/battle/trainer_control.h
          key: gba-assets-${{ runner.os }}-${{ hashFiles('Makefile', 'config.mk', 'make_tools.mk', 'sound/**/*', 'data/**/*', 'tools/**/*.c', 'tools/**/*.cpp') }}
          restore-keys: |
            gba-assets-${{ runner.os }}-

      - name: Build GBA Assets
        if: steps.cache-gba-assets.outputs.cache-hit != 'true'
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          mkdir -p .ccache
          export PATH="/usr/lib/ccache:$PATH"
          make -j$(nproc) tools
          make -j$(nproc) all KEEP_TEMPS=1 || echo "Assets generated, ignoring link error"

#      - name: Decode Keystore
#        if: github.event_name != 'pull_request'
#        env:
#          ENCODED_STRING: ${{ secrets.SIGNING_KEY }}
#        run: |
#          echo $ENCODED_STRING | base64 -d > android/release.keystore

      - name: Build Android APK
        run: |
          chmod +x android/SDL2/android-project/gradlew
          android/SDL2/android-project/gradlew -p android :app:assembleDebug
        env:
          KEYSTORE_PATH: ../../release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create Draft Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-${{ github.sha }}
          name: "Android Successful Build"
          draft: true
          files: |
            android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
