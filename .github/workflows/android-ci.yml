name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # 1. 安装 GBA 编译环境
      - name: Install GBA Toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-arm-none-eabi gcc-arm-none-eabi libnewlib-arm-none-eabi \
            libpng-dev python3 ccache

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 2. 预编译 GBA 资产，并执行“降维打击”级别的路径同步
      - name: Build GBA ROM & Mirror Correct Assets
        run: |
          make -j$(nproc) tools
          # KEEP_TEMPS=1 确保生成的 .inc 和 .i 文件不被删除
          make -j$(nproc) all KEEP_TEMPS=1 || echo "GBA Link failed, continuing to sync assets..."
          
          echo "Mirroring generated assets into root for NDK compatibility..."
          # 关键点：将生成的图形和数据资源直接合并到根目录，去掉 assets 层级
          # 解决 Failed to open "./graphics/..." 报错
          if [ -d "build/assets/graphics" ]; then
            cp -a build/assets/graphics/. graphics/
          fi
          if [ -d "build/assets/data" ]; then
            cp -a build/assets/data/. data/
          fi
          
          # 同步 generated 头文件（如 map_groups.h）到 include
          if [ -d "build/emerald" ]; then
             cp -a build/emerald/. .
             find build/emerald -name "*.h" -exec cp -v {} include/ \;
             # 将成功的 special_ids.inc 备份出来，下一步会用到
             cp build/emerald/special_ids.inc /tmp/special_ids.inc || true
          fi
          
          # 确保 platform.h 在 include 目录下
          find src/platform -name "platform.h" -exec cp -v {} include/ \;

      - name: Decode Keystore
        if: github.event_name != 'pull_request'
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY }}
        run: |
          echo $ENCODED_STRING | base64 -d > android/release.keystore

      # 3. 编译 Android APK，并在编译中间过程拦截修复 special_ids.inc
      - name: Build Android APK
        run: |
          chmod +x android/SDL2/android-project/gradlew
          
          # 先运行一次配置，让 Android 编译目录产生
          android/SDL2/android-project/gradlew -p android :app:generateReleaseResValues || true
          
          # 强行修复损坏的 special_ids.inc
          # 我们在全局搜索所有由 CMake 产生的损坏 inc 文件，并用 GBA 编译出的正确版本覆盖它们
          echo "Repairing corrupted special_ids.inc files..."
          find android/app/.cxx -name "special_ids.inc" -exec cp -v /tmp/special_ids.inc {} \; || echo "No files to fix yet"
          
          # 正式编译
          android/SDL2/android-project/gradlew -p android :app:assembleRelease
        env:
          KEYSTORE_PATH: ../../release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pokeemerald-android-release
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create Draft Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-${{ github.sha }}
          name: "Android Successful Build"
          draft: true
          files: |
            android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up Keystore
        if: always()
        run: rm -f android/release.keystore
