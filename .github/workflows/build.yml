name: CI

on:
  workflow_dispatch:

env:
  GAME_REVISION: 0
  GAME_LANGUAGE: ENGLISH
  COMPARE: 0
  UNUSED_ERROR: 1
  DEPRECATED_ERROR: 1
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-arm-none-eabi gcc-arm-none-eabi libnewlib-arm-none-eabi \
            libpng-dev python3 ccache

      - name: Cache build tools
        uses: actions/cache@v4
        with:
          path: |
            tools/bin2c/bin2c
            tools/gbafix/gbafix
            tools/gbagfx/gbagfx
            tools/jsonproc/jsonproc
            tools/mapjson/mapjson
            tools/mid2agb/mid2agb
            tools/preproc/preproc
            tools/ramscrgen/ramscrgen
            tools/rsfont/rsfont
            tools/scaninc/scaninc
            tools/trainerproc/trainerproc
            tools/compresSmol/compresSmol
            tools/compresSmol/compresSmolTilemap
            tools/wav2agb/wav2agb
          key: tools-${{ runner.os }}-${{ hashFiles('tools/*/Makefile', 'tools/**/*.c', 'tools/**/*.cpp', 'tools/**/*.h') }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-emerald-${{ runner.os }}-${{ hashFiles('**.c', '**.h', 'Makefile', 'config.mk', 'include/**/*.h') }}-${{ github.ref_name }}
          restore-keys: |
            ccache-emerald-${{ runner.os }}-${{ hashFiles('**.c', '**.h', 'Makefile', 'config.mk', 'include/**/*.h') }}-
            ccache-emerald-${{ runner.os }}-

      - name: ROM (Emerald)
        env:
          GAME_VERSION: EMERALD
        run: |
          mkdir -p ${{ env.CCACHE_DIR }}

          # ccache 配置
          export CCACHE_DIR=${{ env.CCACHE_DIR }}
          export CCACHE_MAXSIZE=500M
          export CCACHE_SLOPPINESS="time_macros,include_file_mtime,include_file_ctime,pch_defines,locale,modules"
          export CCACHE_COMPILERCHECK=content

          ccache -M 500M
          echo "=== 编译前 Ccache 状态 ==="
          ccache -s

          # ==================== 关键修复 ====================
          # 只在游戏编译时使用 ccache + arm-none-eabi-gcc
          # 工具构建仍然使用原生 gcc
          echo "=== 开始构建工具 ==="
          make tools   # 先正常构建工具（使用宿主 gcc）

          echo "=== 开始编译 ROM ==="
          make -j$(nproc) all \
            CC="ccache arm-none-eabi-gcc" \
            CXX="ccache arm-none-eabi-g++" \
            KEEP_TEMPS=1

          echo "=== 编译后 Ccache 状态 ==="
          ccache -s
