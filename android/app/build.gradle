plugins {
    id 'com.android.application'
}

android {
    namespace 'com.pokeemerald.experimental'
    compileSdk 36
    ndkVersion '29.0.14206865'

    defaultConfig {
        applicationId 'com.pokeemerald.experimental'
        minSdk 21
        targetSdk 36
        versionCode 2
        versionName '0.2-experimental'

        ndk {
            abiFilters 'armeabi-v7a'
        }

        externalNativeBuild {
            cmake {
                arguments '-DANDROID_STL=c++_static'
            }
        }
    }

    externalNativeBuild {
        cmake {
            path file('src/main/cpp/CMakeLists.txt')
            version '3.22.1'
        }
    }

    sourceSets.main.java.srcDirs += '../SDL2/android-project/app/src/main/java'
    sourceSets.main.assets.srcDir(layout.buildDirectory.dir('generated/borderAssets'))
}

tasks.register('copyBorderAsset', Sync) {
    from(rootProject.file('..')) {
        include 'BG*.png'
        include 'Border.png'
    }
    into layout.buildDirectory.dir('generated/borderAssets')
}

tasks.named('preBuild').configure {
    dependsOn tasks.named('copyBorderAsset')
}
